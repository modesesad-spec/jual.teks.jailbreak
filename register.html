<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - RAT-GN</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;}
        body{background:#0a0a0a;display:flex;justify-content:center;align-items:center;min-height:100vh;}
        .register-box{background:#111;padding:40px;border-radius:10px;width:380px;border:1px solid #222;}
        h2{color:#00ff88;text-align:center;margin-bottom:30px;}
        .form-group{margin-bottom:20px;}
        label{display:block;margin-bottom:8px;color:#aaa;font-size:14px;}
        input{width:100%;padding:12px;background:#1a1a1a;border:1px solid #333;border-radius:5px;color:#fff;font-size:16px;}
        input:focus{outline:none;border-color:#00ff88;}
        button{width:100%;padding:14px;background:#00ff88;color:#000;border:none;border-radius:5px;font-size:16px;font-weight:bold;cursor:pointer;margin-top:10px;}
        .login-link{text-align:center;margin-top:25px;color:#aaa;}
        .login-link a{color:#00ff88;text-decoration:none;}
        .invite-note{margin-top:25px;padding:15px;background:#1a1a1a;border-radius:5px;border:1px solid #333;text-align:center;}
        .invite-note p{color:#aaa;font-size:14px;}
        .invite-note span{color:#00ff88;font-weight:bold;font-size:16px;}
        #msg{color:#00ff88;text-align:center;margin-bottom:15px;display:none;}
        #errorMsg{color:#ff5555;text-align:center;margin-bottom:15px;display:none;}
    </style>
</head>
<body>
    <div class="register-box">
        <h2>REGISTER</h2>
        <div id="msg"></div>
        <div id="errorMsg"></div>
        <form id="registerForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>
            <div class="form-group">
                <label>Invite Code</label>
                <input type="text" id="inviteCode" required placeholder="MASUKKAN INVITE CODE">
            </div>
            <button type="submit">Daftar</button>
        </form>
        <div class="login-link">
            Sudah punya akun? <a href="login.html">Login</a>
        </div>
        <div class="invite-note">
            <p>Invite Code untuk register:</p>
            <span>SANZMODZ2024</span>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const inviteCode = document.getElementById('inviteCode').value;
            
            // Validasi invite code
            if(inviteCode !== 'SANZMODZ2024') {
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('errorMsg').textContent = 'Invite code salah!';
                return;
            }
            
            // Ambil data users
            let users = JSON.parse(localStorage.getItem('users')) || [];
            
            // Cek duplikat
            if(users.some(u => u.username === username)) {
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('errorMsg').textContent = 'Username sudah digunakan!';
                return;
            }
            
            if(users.some(u => u.email === email)) {
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('errorMsg').textContent = 'Email sudah digunakan!';
                return;
            }
            
            // Tambah user baru
            users.push({
                username: username,
                email: email,
                password: password,
                role: 'user',
                balance: 200000 // Bonus saldo awal
            });
            
            localStorage.setItem('users', JSON.stringify(users));
            
            document.getElementById('msg').style.display = 'block';
            document.getElementById('msg').textContent = 'Registrasi berhasil! Redirecting...';
            
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 1500);
        });
    </script>
</body>
</html>
