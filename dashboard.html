            padding: 0;

        }
        
        body {
            background: #0a0a0a;
            color: #fff;
        }
        
        .navbar {
            background: #000;
            padding: 15px 0;

        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo h1 {
            color: #00ff88;
        }
        
        .user-info {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        
        .balance {
            background: #00ff88;
            color: #000;
            padding: 5px 15px;
            border-radius: 5px;
            font-weight: bold;
        }
        
        .logout-btn {
            background: #ff3333;
            color: #fff;
            padding: 5px 15px;
            border-radius: 5px;
            text-decoration: none;
        }
        
        .welcome {
            padding: 40px 0;
        }
        
        .welcome h2 {
            font-size: 32px;
            color: #00ff88;
            margin-bottom: 10px;
        }
        
        .products {
            padding: 40px 0;
        }
        
        .section-title {
            margin-bottom: 30px;
        }
        
        .section-title h3 {
            font-size: 28px;
            color: #00ff88;
        }
        
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }
        
        .product-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 25px;
        }
        
        .product-title {
            font-size: 20px;
            color: #00ff88;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .product-desc {
            color: #999;
            margin-bottom: 15px;
        }
        
        .product-price {
            font-size: 24px;
            margin: 20px 0;
        }
        
        .btn-buy {
            width: 100%;
            padding: 12px;
            background: #00ff88;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
            width: 90%;
            border: 1px solid #00ff88;
        }
        
        .modal-content h3 {
            color: #00ff88;
            margin-bottom: 20px;
        }
        
        .modal-content pre {
            background: #000;
            padding: 20px;
            border-radius: 5px;
            color: #00ff88;
            white-space: pre-wrap;
            margin: 20px 0;
        }
        
        .close {
            background: #ff3333;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>

        document.getElementById('balanceDisplay').textContent = `Rp ${currentUser.balance.toLocaleString()}`;
        document.getElementById('welcomeMsg').textContent = `Welcome back, ${currentUser.username}`;
        
        function renderProducts() {
            const container = document.getElementById('productList');
            let html = '';
            products.forEach(p => {
                html += `
                    <div class="product-card">
                        <div class="product-title">${p.name}</div>
                        <div class="product-desc">${p.desc}</div>
                        <div class="product-price">Rp ${p.price.toLocaleString()}</div>
                        <button class="btn-buy" onclick="buyProduct(${p.id}, ${p.price}, '${p.name}')">BELI</button>
                    </div>
                `;
            });
            container.innerHTML = html;
        }
        
        function buyProduct(id, price, name) {
            if(currentUser.balance >= price) {
                // KURANGI SALDO
                currentUser.balance -= price;
                
                // UPDATE LOCALSTORAGE
                let users = JSON.parse(localStorage.getItem('users'));
                const userIndex = users.findIndex(u => u.username === currentUser.username);
                users[userIndex].balance = currentUser.balance;
                localStorage.setItem('users', JSON.stringify(users));
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                
                // UPDATE TAMPILAN
                document.getElementById('balanceDisplay').textContent = `Rp ${currentUser.balance.toLocaleString()}`;
                
                // TAMPILKAN TEKS
                const product = products.find(p => p.id === id);
                document.getElementById('modalTitle').textContent = name;
                document.getElementById('modalContent').textContent = product.content;
                document.getElementById('resultModal').style.display = 'flex';
            } else {
                alert('Saldo tidak cukup!');
            }
        }
        
        function closeModal() {
            document.getElementById('resultModal').style.display = 'none';
        }
        
        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }
        
        renderProducts();
    </script>

</html>
