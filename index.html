        // Beli produk
        function buyProduct(id) {
            const product = products.find(p => p.id === id);
            if(currentUser.balance < product.price) {
                alert(`Saldo tidak cukup! Butuh Rp ${product.price.toLocaleString()}`);
                return;
            }

            // Kurangi saldo
            currentUser.balance -= product.price;
            
            // Update localStorage
            let users = JSON.parse(localStorage.getItem('users'));
            const idx = users.findIndex(u => u.username === currentUser.username);
            users[idx].balance = currentUser.balance;
            localStorage.setItem('users', JSON.stringify(users));
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            
            document.getElementById('balanceDisplay').innerText = `Rp ${currentUser.balance.toLocaleString()}`;
            
            selectedProduct = product;
            document.getElementById('modalTitle').innerText = `Custom ${product.name}`;
