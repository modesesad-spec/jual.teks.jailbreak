<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RAT-GN DARK</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        
        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .login-container {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
            border: 1px solid #333;
        }
        
        h2 {
            color: #00ff88;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        input {
            width: 100%;
            padding: 15px;
            background: #333;
            border: none;
            border-radius: 5px;
            color: #fff;
            font-size: 16px;
        }
        
        input::placeholder {
            color: #999;
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: #00ff88;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        
        button:hover {
            background: #00cc66;
        }
        
        .error {
            background: rgba(255,0,0,0.1);
            border: 1px solid #ff3333;
            color: #ff3333;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .success {
            background: rgba(0,255,136,0.1);
            border: 1px solid #00ff88;
            color: #00ff88;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .register-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        
        .register-link a {
            color: #00ff88;
            text-decoration: none;
        }
        
        .demo-accounts {
            margin-top: 30px;
            padding: 20px;
            background: #222;
            border-radius: 5px;
        }
        
        .demo-accounts h4 {
            color: #00ff88;
            margin-bottom: 10px;
        }
        
        .demo-accounts p {
            color: #999;
            margin: 5px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>⚡ RAT-GN DARK</h2>
        
        <div id="errorMsg" class="error" style="display:none;"></div>
        <div id="successMsg" class="success" style="display:none;"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <input type="text" id="username" placeholder="Username" required>
            </div>
            <div class="form-group">
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <button type="submit">LOGIN</button>
        </form>
        
        <div class="register-link">
            Belum punya akun? <a href="register.html">Register</a>
        </div>
        
        <div class="demo-accounts">
            <h4>🔑 AKUN DEMO:</h4>
            <p><strong style="color:#00ff88">sanzmodz</strong> / sanzmodz123 (master)</p>
            <p><strong style="color:#00ff88">user1</strong> / user123 (user)</p>
            <p><strong style="color:#00ff88">admin</strong> / admin123 (admin)</p>
        </div>
    </div>
    
    <script>
        // DATABASE PENGGUNA (SIMPAN DI LOCALSTORAGE)
        const users = [
            {username: 'sanzmodz', password: 'sanzmodz123', role: 'master', balance: 10000000},
            {username: 'user1', password: 'user123', role: 'user', balance: 500000},
            {username: 'admin', password: 'admin123', role: 'admin', balance: 0}
        ];
        
        // SIMPAN KE LOCALSTORAGE (PERTAMA KALI)
        if(!localStorage.getItem('users')) {
            localStorage.setItem('users', JSON.stringify(users));
        }
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const users = JSON.parse(localStorage.getItem('users')) || [];
            
            const user = users.find(u => u.username === username && u.password === password);
            
            if(user) {
                // SIMPAN SESSION
                localStorage.setItem('currentUser', JSON.stringify({
                    username: user.username,
                    role: user.role,
                    balance: user.balance
                }));
                
                document.getElementById('successMsg').style.display = 'block';
                document.getElementById('successMsg').textContent = 'Login berhasil! Redirecting...';
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
            } else {
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('errorMsg').textContent = 'Username atau password salah!';
            }
        });
    </script>
</body>
</html>
