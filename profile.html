<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - RAT-GN</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;}
        body{background:#0a0a0a;color:#e0e0e0;padding:40px 20px;}
        .container{max-width:500px;margin:0 auto;background:#111;padding:30px;border-radius:10px;border:1px solid #222;}
        h1{color:#00ff88;margin-bottom:30px;}
        .info-item{margin-bottom:20px;padding-bottom:15px;border-bottom:1px solid #333;}
        .label{color:#888;font-size:14px;margin-bottom:5px;}
        .value{font-size:18px;}
        .balance{color:#00ff88;font-size:24px;font-weight:bold;}
        .back{display:inline-block;margin-top:20px;color:#00ff88;text-decoration:none;}
    </style>
</head>
<body>
    <div class="container">
        <h1>👤 PROFILE</h1>
        <div id="profileContent">
            <!-- Diisi JavaScript -->
        </div>
        <a href="dashboard.html" class="back">← Kembali ke Dashboard</a>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('currentUser'));
        if(!user) window.location.href = 'login.html';
        
        const users = JSON.parse(localStorage.getItem('users'));
        const fullUser = users.find(u => u.username === user.username);
        
        document.getElementById('profileContent').innerHTML = `
            <div class="info-item">
                <div class="label">Username</div>
                <div class="value">${fullUser.username}</div>
            </div>
            <div class="info-item">
                <div class="label">Email</div>
                <div class="value">${fullUser.email || '-'}</div>
            </div>
            <div class="info-item">
                <div class="label">Role</div>
                <div class="value">${fullUser.role.toUpperCase()}</div>
            </div>
            <div class="info-item">
                <div class="label">Saldo</div>
                <div class="value balance">Rp ${fullUser.balance.toLocaleString()}</div>
            </div>
            <div class="info-item">
                <div class="label">Bergabung</div>
                <div class="value">${new Date().toLocaleDateString('id-ID')}</div>
            </div>
        `;
    </script>
</body>
</html>
